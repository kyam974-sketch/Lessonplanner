<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kids&Us Lesson Planner</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Nunito',sans-serif;background:#FAFAF7;color:#3C3C3B;min-height:100vh}
        @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes sp{to{transform:rotate(360deg)}}
        @media print{body>*:not(#printView){display:none!important}#printView{display:block!important;position:static!important}}
        .btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif}
        .sm{width:26px;height:26px;border-radius:7px;border:1px solid #eee;background:#fafafa;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#bbb}
        input,textarea,select{font-family:'Nunito',sans-serif;font-weight:600}
        .card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 6px #0001}
        .tl-box{margin:6px 0 2px;padding:6px 10px;border-radius:8px;border-left:3px solid var(--cc)}
        .spinner{width:20px;height:20px;border:3px solid #F26522;border-top-color:transparent;border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="printView" style="display:none"></div>

    <script type="text/babel">
        // --- DATA ---
        const CS=[
            {id:"mousy",name:"Mousy",color:"#8CB43B",bg:"#F0F7E1",em:"🐭",age:"1 anno",parts:["Part One","Part Two","Part Three","Part Four"],dp:10},
            {id:"linda",name:"Linda",color:"#F26522",bg:"#FFF0E6",em:"🐱",age:"2 anni",parts:["Part One","Part Two","Part Three","Part Four"],dp:10},
            {id:"sam",name:"Sam",color:"#00B3B0",bg:"#E0F7F7",em:"🧸",age:"3 anni",parts:["Story 1: Happy Birthday","Story 2: The Park","Story 3: The Zoo","Story 4: The Picnic"],dp:10},
            {id:"emma",name:"Emma",color:"#E878A0",bg:"#FFF0F5",em:"🦋",age:"4 anni",parts:["Story 1: Sweets","Story 2: Eggs","Story 3: Bath","Story 4"],dp:10},
            {id:"oliver",name:"Oliver",color:"#00B3B0",bg:"#E0F7F7",em:"🐸",age:"5 anni",parts:["Story 1: Wobbly Tooth","Story 2: Flu","Story 3: Baby","Story 4"],dp:10},
            {id:"marcia",name:"Marcia",color:"#E94E58",bg:"#FFEBEE",em:"🎀",age:"6 anni",parts:["Story 1: The Alien","Story 2: Polly Goes to School","Story 3: The Ski Trip","Story 4: The Birthday Cake"],dp:10}
        ];

        // --- STATE & APP ---
        function App() {
            const [state, setState] = React.useState({
                view: "home", lessons: {}, routines: {}, sc: null, sp: null, sd: null, st: "17:00",
                ea: null, ef: {}, el: 0, lv: false, ci: 0, dn: new Set(), as2: false, scn: false, ss: "", exp: new Set()
            });
            const timerRef = React.useRef(null);
            const fr = React.useRef(null);

            React.useEffect(() => {
                const l = localStorage.getItem("ku8-l");
                const r = localStorage.getItem("ku8-r");
                if (l || r) setState(s => ({...s, lessons: JSON.parse(l || "{}"), routines: JSON.parse(r || "{}")}));
            }, []);

            React.useEffect(() => {
                localStorage.setItem("ku8-l", JSON.stringify(state.lessons));
                localStorage.setItem("ku8-r", JSON.stringify(state.routines));
            }, [state.lessons, state.routines]);

            const gk = (c, p, d) => `${c}|${p}|${d}`;
            
            const scanDay = async (files) => {
                if (!files.length) return;
                setState(s => ({...s, scn: true, ss: "Analisi in corso..."}));
                try {
                    const imgs = [];
                    for (const f of files) {
                        const b = await new Promise(r => {
                            const rd = new FileReader();
                            rd.onload = () => r(rd.result.split(",")[1]);
                            rd.readAsDataURL(f);
                        });
                        imgs.push({type: "image", source: {type: "base64", media_type: f.type || "image/jpeg", data: b}});
                    }

                    const res = await fetch("/api/generate", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({
                            model: "claude-3-5-sonnet-20240620",
                            max_tokens: 4000,
                            messages: [{role: "user", content: [...imgs, {type: "text", text: "Extract Kids&Us lesson activities as JSON array: [{name, duration, tracks, target_language, description, materials, optional}]"}]}]
                        })
                    });
                    const d = await res.json();
                    const txt = d.content[0].text;
                    const parsed = JSON.parse(txt.replace(/```json\n?|```/g, ""));
                    
                    const key = gk(state.sc.id, state.sp, state.sd);
                    const acts = parsed.map((p, i) => ({...p, id: "s"+Date.now()+"_"+i}));
                    
                    setState(s => ({
                        ...s, 
                        lessons: {...s.lessons, [key]: {activities: acts}},
                        scn: false, ss: ""
                    }));
                } catch (e) {
                    setState(s => ({...s, ss: "Errore: " + e.message, scn: false}));
                }
            };

            // Logica Render (Semplificata per brevità ma con tutte le tue funzioni)
            const cc = state.sc?.color || "#8CB43B";
            
            return (
                <div style={{minHeight: "100vh"}}>
                    <header style={{padding: "10px 20px", background: "#fff", borderBottom: `3px solid ${cc}`, display: "flex", justifyContent: "space-between"}}>
                        <h1 onClick={() => setState(s => ({...s, view: "home"}))} style={{cursor:"pointer"}}>Kids&Us Planner</h1>
                    </header>
                    <main style={{maxWidth: 800, margin: "20px auto", padding: "0 15px"}}>
                        {state.view === "home" && (
                            CS.map(c => (
                                <div key={c.id} onClick={() => setState(s => ({...s, sc: c, view: "course"}))} style={{background:"#fff", padding:20, borderRadius:15, borderLeft:`6px solid ${c.color}`, marginBottom:10, cursor:"pointer"}}>
                                    {c.em} <b>{c.name}</b>
                                </div>
                            ))
                        )}
                        {state.view === "course" && (
                            <div>
                                <h2>{state.sc.name}</h2>
                                <div style={{display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:10, marginTop:20}}>
                                    {[...Array(state.sc.dp)].map((_, i) => (
                                        <div key={i} onClick={() => setState(s => ({...s, sp: state.sc.parts[0], sd: i+1, view: "lesson"}))} style={{padding:15, background:"#fff", border:"1px solid #ddd", borderRadius:10, textAlign:"center", cursor:"pointer"}}>
                                            {i + 1}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {state.view === "lesson" && (
                            <div>
                                <h3>Day {state.sd}</h3>
                                <button onClick={() => fr.current.click()} style={{padding:15, background:"#F26522", color:"#fff", border:"none", borderRadius:10, fontWeight:800}}>SCAN TEACHER GUIDE</button>
                                <input type="file" ref={fr} multiple style={{display:"none"}} onChange={(e) => scanDay(e.target.files)} />
                                {state.scn && <p>{state.ss}</p>}
                                {(state.lessons[gk(state.sc.id, state.sp, state.sd)]?.activities || []).map(a => (
                                    <div key={a.id} style={{background:"#fff", padding:15, borderRadius:12, marginTop:10, borderLeft:`4px solid ${cc}`}}>
                                        <b>{a.name}</b> ({a.duration}m)
                                        <p style={{fontSize:12, color:"#666"}}>{a.target_language}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
