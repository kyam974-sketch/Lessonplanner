<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kids&Us Lesson Planner</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#FAFAF7;color:#3C3C3B;min-height:100vh}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}
@media print{body>*:not(#printView){display:none!important}#printView{display:block!important;position:static!important}}
.btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif}
.sm{width:26px;height:26px;border-radius:7px;border:1px solid #eee;background:#fafafa;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#bbb}
.lab{display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:700;color:#888;margin-bottom:12px}
.inp{padding:10px 12px;border:2px solid #eee;border-radius:10px;font-size:14px;font-weight:600;resize:vertical;font-family:'Nunito',sans-serif}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// Sostituisco gli import con l'accesso globale a React
const { useState, useEffect, useRef, useCallback } = React;

const CS = [
  {id:"mousy",name:"Mousy",color:"#8CB43B",bg:"#F0F7E1",em:"\u{1F42D}",age:"1 anno",parts:["Part One","Part Two","Part Three","Part Four"],dp:10},
  {id:"linda",name:"Linda",color:"#F26522",bg:"#FFF0E6",em:"\u{1F431}",age:"2 anni",parts:["Part One","Part Two","Part Three","Part Four"],dp:10},
  {id:"sam",name:"Sam",color:"#00B3B0",bg:"#E0F7F7",em:"\u{1F9F8}",age:"3 anni",parts:["Story 1: Happy Birthday","Story 2: The Park","Story 3: The Zoo","Story 4: The Picnic"],dp:10},
  {id:"emma",name:"Emma",color:"#E878A0",bg:"#FFF0F5",em:"\u{1F98B}",age:"4 anni",parts:["Story 1: Sweets","Story 2: Eggs","Story 3: Bath","Story 4"],dp:10},
  {id:"oliver",name:"Oliver",color:"#00B3B0",bg:"#E0F7F7",em:"\u{1F438}",age:"5 anni",parts:["Story 1: Wobbly Tooth","Story 2: Flu","Story 3: Baby","Story 4"],dp:10},
  {id:"marcia",name:"Marcia",color:"#E94E58",bg:"#FFEBEE",em:"\u{1F380}",age:"6 anni",parts:["Story 1: The Alien","Story 2: Polly Goes to School","Story 3: The Ski Trip","Story 4: The Birthday Cake"],dp:10},
];

function App(){
  const[view,setV]=useState("home");
  const[lessons,setL]=useState({});
  const[sc,setSc]=useState(null);
  const[sp,setSp]=useState(null);
  const[sd,setSd]=useState(null);
  const[st,setSt]=useState("17:00");
  const[ld,setLd]=useState(true);
  const[ea,setEa]=useState(null);
  const[ef,setEf]=useState({});
  const[el,setEl]=useState(0);
  const[lv,setLv]=useState(false);
  const[ci,setCi]=useState(0);
  const[dn,setDn]=useState(new Set());
  const[as2,setAs]=useState(false);
  const[pr,setPr]=useState(false);
  const[scn,setScn]=useState(false);
  const[ss,setSs]=useState("");
  const[exp,setExp]=useState(new Set());
  const fr=useRef(null),tr=useRef(null),ar=useRef(null);

  useEffect(()=>{
    const s = localStorage.getItem("ku7");
    if(s) setL(JSON.parse(s));
    setLd(false);
  },[]);

  useEffect(()=>{if(!ld) localStorage.setItem("ku7",JSON.stringify(lessons))},[lessons,ld]);
  
  useEffect(()=>{
    if(lv) tr.current=setInterval(()=>setEl(e=>e+1),1000);
    else clearInterval(tr.current);
    return ()=>clearInterval(tr.current)
  },[lv]);

  useEffect(()=>{
    if(as2&&view==="live"&&!lv){
      ar.current=setInterval(()=>{
        const n=new Date(),p=st.split(":").map(Number);
        if(n.getHours()===p[0]&&n.getMinutes()===p[1]&&n.getSeconds()<2){setLv(true);setAs(false)}
      },1000)
    } else clearInterval(ar.current);
    return ()=>clearInterval(ar.current)
  },[as2,view,lv,st]);

  const cl=sc&&sp!=null&&sd!=null?lessons[sc.id+"|"+sp+"|"+sd]:null;
  const svL=useCallback(l=>{setL(p=>({...p,[l.courseId+"|"+l.part+"|"+l.day]:l}))},[]);
  const gT=(a,s)=>{const[h,m]=s.split(":").map(Number);let c=0;return a.filter(x=>!x.optional).map(x=>{const t=h*60+m+c;c+=x.duration;return {...x,st:`${String(Math.floor(t/60)%24).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`}})};
  const td=a=>a.filter(x=>!x.optional).reduce((s,x)=>s+x.duration,0);
  const ft=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const goH=()=>{setV("home");setSc(null);setSp(null);setSd(null);setLv(false);setDn(new Set())};
  const togExp=id=>{setExp(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n})};

  const scanD=async files=>{
    if(!files||!files.length||!sc||!sp||!sd)return;
    setScn(true);setSs("Lettura...");
    try{
      const imgs=[];
      for(const f of files){
        const b=await new Promise((r,j)=>{
          const rd=new FileReader();
          rd.onload=()=>r(rd.result.split(",")[1]);
          rd.onerror=j;
          rd.readAsDataURL(f)
        });
        imgs.push({type:"image",source:{type:"base64",media_type:f.type||"image/jpeg",data:b}})
      }
      setSs("AI analizza "+imgs.length+" pagine...");
      var prText="You are analyzing a Kids&Us Teacher Guide lesson plan for: "+sc.name+" - "+sp+" - Day "+sd+".\n\n";
      prText+="CRITICAL RULES:\n1. The LESSON PLAN section lists numbered activities. Extract EXACTLY those in EXACT order.\n2. Warm-Up Routines is always ONE single block. Output as ONE item.\n3. Use the EXACT duration in parentheses.\n4. target_language: ONLY exact phrases in bold/quotes.\n\nRespond with JSON array ONLY.";
      
      const res=await fetch("/api/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-3-5-sonnet-20240620",
          max_tokens:4000,
          messages:[{role:"user",content:[...imgs,{type:"text",text:prText}]}]
        })
      });
      const d=await res.json();
      const txt=d.content?.map(c=>c.type==="text"?c.text:"").join("")||"";
      setSs("Elaborazione...");
      let parsed;
      try{parsed=JSON.parse(txt.replace(/```json\n?|```/g,"").trim())}catch{const m=txt.match(/\[[\s\S]*\]/);if(m)parsed=JSON.parse(m[0]);else throw new Error("Risposta AI non valida")}
      const acts=parsed.map((p,i)=>({id:"s"+Date.now()+"_"+i,name:p.name||"?",duration:p.duration||3,tracks:p.tracks||"",targetLanguage:p.target_language||"",description:p.description||"",materials:p.materials||"",optional:!!p.optional,sub:p.sub||null}));
      svL({courseId:sc.id,part:sp,day:sd,activities:acts});
      setSs("Fatto!");
      setTimeout(()=>{setSs("");setScn(false)},3500)
    }catch(e){setSs("Errore: "+e.message);setTimeout(()=>{setSs("");setScn(false)},4000)}
  };

  const delL=()=>{const k=sc.id+"|"+sp+"|"+sd;setL(p=>{const n={...p};delete n[k];return n})};

  useEffect(()=>{if(lv&&cl){const t=gT(cl.activities,st);let c=0;for(let j=0;j<t.length;j++){c+=t[j].duration;if(el/60<c){setCi(j);return}}setCi(t.length-1)}},[el,lv,cl,st]);

  if(ld) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><p>Caricamento...</p></div>;
  const cc=sc?.color||"#8CB43B",cbg=sc?.bg||"#F0F7E1";

  if(pr&&cl){
    const ti=gT(cl.activities,st);
    let html = '<div id="printView" style="font-family:Nunito,sans-serif;padding:24px;max-width:800px;margin:0 auto;background:#fff">';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:16px"><button onclick="window.print()" style="padding:8px 20px;background:'+cc+';color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700">Stampa</button><button onclick="window.dispatchEvent(new CustomEvent(\'closePrint\'))" style="padding:8px 20px;background:#eee;border:none;border-radius:10px;cursor:pointer;font-weight:700">Chiudi</button></div>';
    html += '<div style="border-bottom:3px solid '+cc+';padding-bottom:8px;margin-bottom:16px"><h1 style="margin:0;font-size:20px">'+sc.em+' '+sc.name+' — '+sp+' — <span style="color:'+cc+'">Day '+sd+'</span></h1></div>';
    cl.activities.forEach(a=>{
      const t=ti.find(x=>x.id===a.id);
      html+='<div style="padding:6px 0;border-bottom:1px solid #eee;opacity:'+(a.optional?".6":"1")+'">';
      html+='<div style="display:flex;gap:8px;align-items:baseline"><b style="font-family:monospace;color:'+cc+';width:44px;font-size:12px">'+(t?t.st:"\u2014")+'</b><b style="font-size:12px">'+(a.optional?"[OPT] ":"")+a.name+'</b><span style="color:#aaa;font-size:10px">'+a.duration+'m '+(a.tracks||"")+'</span></div>';
      if(a.targetLanguage)html+='<div style="margin:3px 0 0 52px;padding:3px 6px;background:#FFFDE7;border-radius:4px;font-size:10px;border-left:2px solid '+cc+'">'+a.targetLanguage+'</div>';
      if(a.sub&&a.sub.length)a.sub.forEach(s=>{html+='<div style="margin:2px 0 0 52px;font-size:9px;color:#888"><b>'+s.name+':</b> '+(s.target_language||"\u2014")+'</div>'});
      if(a.description)html+='<p style="margin:2px 0 0 52px;font-size:10px;color:#888">'+a.description+'</p></div>';
    });
    html += '</div>';
    window.addEventListener('closePrint', () => setPr(false), {once:true});
    return <div dangerouslySetInnerHTML={{__html: html}} />;
  }

  return (
    <div style={{minHeight:"100vh",background:"#FAFAF7"}}>
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px",background:"#fff",borderBottom:"3px solid #8CB43B",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={goH}>
          <div style={{width:38,height:38,borderRadius:11,background:"#8CB43B",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{"\u{1F42D}"}</div>
          <h1 style={{margin:0,fontSize:15,fontWeight:800}}>Kids&Us Planner</h1>
        </div>
      </header>
      <main style={{maxWidth:900,margin:"0 auto",padding:"20px 16px"}}>
        {view==="home"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          {CS.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:14,background:"#fff",borderRadius:16,padding:"16px 20px",cursor:"pointer",borderLeft:"5px solid "+c.color}} onClick={()=>{setSc(c);setV("course")}}><div style={{fontSize:28}}>{c.em}</div><div style={{flex:1}}><h3 style={{margin:0}}>{c.name}</h3><p style={{margin:0,fontSize:12,color:"#888"}}>{c.age}</p></div></div>)}
        </div>}
        {view==="course"&&sc&&<div>
          <h2 style={{color:cc}}>{sc.name}</h2>
          {sc.parts.map(p=><div key={p} style={{marginTop:24}}><h3>{p}</h3><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(78px,1fr))",gap:8}}>
            {Array.from({length:sc.dp},(_,d)=>d+1).map(day=><div key={day} style={{padding:10,borderRadius:10,border:"2px solid #e0e0e0",textAlign:"center",cursor:"pointer"}} onClick={()=>{setSp(p);setSd(day);setV("lesson")}}>Day {day}</div>)}
          </div></div>)}
        </div>}
        {view==="lesson"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h2>{sc.name} - Day {sd}</h2>
            <div style={{display:"flex",gap:6}}>
              <button className="btn" style={{background:cc,color:"#fff"}} onClick={()=>setV("live")}>Live</button>
              <button className="btn" style={{background:"#F26522",color:"#fff"}} onClick={()=>fr.current.click()}>Scan TG</button>
              <input ref={fr} type="file" multiple style={{display:"none"}} onChange={e=>scanD(e.target.files)}/>
              <button className="btn" style={{background:"#E878A0",color:"#fff"}} onClick={()=>setPr(true)}>Stampa</button>
            </div>
          </div>
          {scn&&<div style={{padding:12,background:"#FFF3E0",borderRadius:12,marginBottom:12}}>{ss}</div>}
          {cl&&cl.activities.map((a,idx)=>(
            <div key={a.id} style={{background:"#fff",borderRadius:14,padding:14,marginBottom:8,borderLeft:"5px solid "+(a.optional?"#FFB74D":cc)}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <b>{a.name}</b><span>{a.duration}m</span>
              </div>
              {a.targetLanguage&&<p style={{fontSize:12,color:cc,marginTop:4}}><i>{a.targetLanguage}</i></p>}
            </div>
          ))}
        </div>}
        {view==="live"&&cl&&<div style={{textAlign:"center"}}>
          <h1>{ft(el)}</h1>
          <button className="btn" style={{background:cc,color:"#fff"}} onClick={()=>setLv(!lv)}>{lv?"Pausa":"Start"}</button>
          <button className="btn" onClick={()=>setV("lesson")}>Indietro</button>
        </div>}
      </main>
    </div>
  )
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
