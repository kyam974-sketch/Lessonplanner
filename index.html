<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K&U Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #FAFAF7; margin: 0; padding: 0; color: #3C3C3B; }
        header { padding: 15px; background: #fff; border-bottom: 3px solid #8CB43B; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:10; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: #fff; border-radius: 15px; padding: 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 6px solid #8CB43B; cursor: pointer; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: 900; width: 100%; cursor: pointer; background: #8CB43B; color: #fff; margin-bottom: 10px; font-family: 'Nunito'; text-align: center; }
        .btn-rt { background: #FFF3E0; color: #E65100; border: 1px dashed #FFB74D; font-size: 10px; padding: 6px 10px; width: auto; border-radius: 8px; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .day-box { padding: 18px 5px; background: #fff; border: 1px solid #eee; border-radius: 12px; text-align: center; font-weight: 900; cursor: pointer; }
        #status-area { display: none; background: #E3F2FD; color: #1565C0; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; font-weight: 800; border: 2px solid #1565C0; }
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #F26522; border-radius: 50%; animation: rot .8s linear infinite; margin: 0 auto 5px; }
        @keyframes rot { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1 onclick="renderHome()" style="margin:0; font-size:18px; font-weight:900; cursor:pointer">K&U PLANNER</h1>
    <div id="course-tag" style="padding:4px 12px; border-radius:15px; font-size:11px; font-weight:800; display:none"></div>
</header>

<div class="container">
    <div id="status-area"></div>
    <div id="main-content"></div>
</div>

<script>
// --- CONFIGURAZIONE DATI ---
const COURSES = [
    {id:"mousy", name:"Mousy", color:"#8CB43B", bg:"#F0F7E1", em:"🐭"},
    {id:"linda", name:"Linda", color:"#F26522", bg:"#FFF0E6", em:"🐱"},
    {id:"sam", name:"Sam", color:"#00B3B0", bg:"#E0F7F7", em:"🧸"},
    {id:"emma", name:"Emma", color:"#E878A0", bg:"#FFF0F5", em:"🦋"},
    {id:"oliver", name:"Oliver", color:"#00B3B0", bg:"#E0F7F7", em:"🐸"},
    {id:"marcia", name:"Marcia", color:"#E94E58", bg:"#FFEBEE", em:"🎀"}
];

let state = { 
    sc: null, ss: null, sd: null, 
    lessons: JSON.parse(localStorage.getItem("ku_l") || "{}"), 
    routines: JSON.parse(localStorage.getItem("ku_r") || "{}") 
};

function save() {
    localStorage.setItem("ku_l", JSON.stringify(state.lessons));
    localStorage.setItem("ku_r", JSON.stringify(state.routines));
}

// --- FUNZIONI DI ANALISI ---
async function handleScan(event, type, storyKey) {
    const files = event.target.files;
    if (!files.length) return;
    
    const status = document.getElementById('status-area');
    status.style.display = 'block';
    status.innerHTML = '<div class="spinner"></div>Analisi in corso...';

    try {
        const imgs = [];
        for (let f of files) {
            const b64 = await new Promise(r => {
                const rd = new FileReader();
                rd.onload = () => r(rd.result.split(',')[1]);
                rd.readAsDataURL(f);
            });
            imgs.push({type: "image", source: {type: "base64", media_type: f.type || "image/jpeg", data: b64}});
        }

        const prompt = type === 'rou' 
            ? "Estrai Welcome, Warm-up e Goodbye (A/B) come JSON array: [{type, name, duration, target_language, description}]"
            : "Estrai attività lezione (NO routine) come JSON array: [{name, duration, target_language, description}]";

        const res = await fetch("/api/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                model: "claude-3-5-sonnet-20240620",
                max_tokens: 4000,
                messages: [{role: "user", content: [...imgs, {type: "text", text: prompt}]}]
            })
        });

        const data = await res.json();
        const parsed = JSON.parse(data.content[0].text.match(/\[[\s\S]*\]/)[0]);

        if (type === 'rou') {
            state.routines[state.sc.id + '|' + storyKey] = parsed;
            save(); renderStories(state.sc.id);
        } else {
            const rKey = state.sc.id + '|' + state.ss;
            const rts = state.routines[rKey] || [];
            state.lessons[state.sc.id + '|' + state.ss + '|' + state.sd] = [
                ...rts.filter(r => r.type === 'welcome' || r.type === 'warmup'),
                ...parsed,
                ...rts.filter(r => r.type === 'goodbye')
            ];
            save(); renderLesson(state.sd);
        }
        status.innerHTML = "✓ Caricamento riuscito!";
        setTimeout(() => status.style.display = 'none', 2000);
    } catch (e) {
        status.innerHTML = "Errore: " + e.message;
    }
}

// --- RENDERING ---
function renderHome() {
    state.sc = null;
    document.getElementById('course-tag').style.display = 'none';
    const main = document.getElementById('main-content');
    main.innerHTML = COURSES.map(c => `
        <div class="card" style="border-left-color:${c.color}" onclick="renderStories('${c.id}')">
            <span style="font-size:24px">${c.em}</span> <b style="margin-left:10px">${c.name}</b>
        </div>
    `).join('');
}

function renderStories(courseId) {
    const c = COURSES.find(x => x.id === courseId);
    state.sc = c;
    const tag = document.getElementById('course-tag');
    tag.style.display = 'block'; tag.style.background = c.bg; tag.style.color = c.color; tag.innerText = c.name;
    
    const main = document.getElementById('main-content');
    let html = `<button class="btn" style="background:none; color:${c.color}; width:auto; padding:0; margin-bottom:15px" onclick="renderHome()">← CORSI</button>`;
    ["Story 1", "Story 2", "Story 3", "Story 4"].forEach(s => {
        const hasR = !!state.routines[c.id + '|' + s];
        html += `
            <div class="card" style="border-left-color:${c.color}; display:flex; justify-content:space-between; align-items:center">
                <b onclick="renderDays('${s}')" style="flex:1">${s}</b>
                <label class="btn-rt" style="background:${hasR ? '#E8F5E9' : '#FFF3E0'}">
                    ${hasR ? "✓ ROUTINES" : "📸 SET ROUTINES"}
                    <input type="file" multiple hidden onchange="handleScan(event, 'rou', '${s}')">
                </label>
            </div>
        `;
    });
    main.innerHTML = html;
}

function renderDays(storyName) {
    state.ss = storyName;
    const main = document.getElementById('main-content');
    main.innerHTML = `<button class="btn" style="background:none; color:${state.sc.color}; width:auto; padding:0" onclick="renderStories('${state.sc.id}')">← STORIE</button>
    <h2 style="font-size:18px">${storyName}</h2>
    <div class="grid">${Array.from({length:10}, (_,i) => `<div class="day-box" onclick="renderLesson(${i+1})">${i+1}</div>`).join('')}</div>`;
}

function renderLesson(day) {
    state.sd = day;
    const main = document.getElementById('main-content');
    const data = state.lessons[state.sc.id + '|' + state.ss + '|' + state.sd] || [];
    let html = `<button class="btn" style="background:none; color:${state.sc.color}; width:auto; padding:0" onclick="renderDays('${state.ss}')">← GIORNI</button>
    <h2 style="font-size:18px">${state.ss} - Giorno ${day}</h2>
    <label class="btn" style="background:${state.sc.color}">📸 SCAN LEZIONE GIORNO ${day}<input type="file" multiple hidden onchange="handleScan(event, 'day')"></label>`;
    
    data.forEach(a => {
        html += `<div class="card" style="border-left-color:${a.type ? '#ddd' : state.sc.color}">
            <div style="display:flex; justify-content:space-between"><b>${a.name}</b><small>${a.duration}m</small></div>
            ${a.target_language ? `<div style="font-size:12px; color:${state.sc.color}; font-style:italic; margin-top:5px">${a.target_language}</div>`:''}
            <p style="font-size:11px; color:#666; margin-top:5px">${a.description}</p>
        </div>`;
    });
    main.innerHTML = html;
}

// Avvio manuale immediato
renderHome();
</script>
</body>
</html>
