<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K&U Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #FAFAF7; margin: 0; padding: 0; color: #3C3C3B; }
        header { padding: 15px; background: #fff; border-bottom: 3px solid #8CB43B; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:10; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: #fff; border-radius: 15px; padding: 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 6px solid #8CB43B; cursor: pointer; display: flex; align-items: center; }
        .course-info { display: flex; align-items: center; gap: 15px; }
        .emoji { font-size: 24px; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: 900; width: 100%; cursor: pointer; background: #8CB43B; color: #fff; margin-bottom: 10px; font-family: 'Nunito'; text-align: center; display: block; text-decoration: none; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .day-box { padding: 18px 5px; background: #fff; border: 1px solid #eee; border-radius: 12px; text-align: center; font-weight: 900; cursor: pointer; }
        #course-tag { padding: 4px 12px; border-radius: 15px; font-size: 11px; font-weight: 800; display: none; }
    </style>
</head>
<body>
<header>
    <h1 onclick="renderHome()" style="margin:0; font-size:18px; font-weight:900; cursor:pointer">K&U PLANNER</h1>
    <div id="course-tag"></div>
</header>
<div class="container" id="main-content"></div>

<script>
const COURSES = [
    { id: "mousy", name: "Mousy", color: "#8CB43B", bg: "#F0F7E1", em: "🐭" },
    { id: "linda", name: "Linda", color: "#F26522", bg: "#FFF0E6", em: "🐱" },
    { id: "sam", name: "Sam", color: "#00B3B0", bg: "#E0F7F7", em: "🧸" },
    { id: "emma", name: "Emma", color: "#E878A0", bg: "#FFF0F5", em: "🦋" },
    { id: "oliver", name: "Oliver", color: "#00B3B0", bg: "#E0F7F7", em: "🐸" },
    { id: "marcia", name: "Marcia", color: "#E94E58", bg: "#FFEBEE", em: "🎀" }
];

let state = { sc: null, ss: null, sd: null, lessons: JSON.parse(localStorage.getItem("ku_manual") || "{}") };

function save() { localStorage.setItem("ku_manual", JSON.stringify(state.lessons)); }

function renderHome() {
    state.sc = null;
    document.getElementById('course-tag').style.display = 'none';
    document.getElementById('main-content').innerHTML = COURSES.map(c => `
        <div class="card" style="border-left-color:${c.color}" onclick="renderStories('${c.id}')">
            <div class="course-info">
                <span class="emoji">${c.em}</span>
                <b style="font-size:18px">${c.name}</b>
            </div>
        </div>
    `).join('');
}

function renderStories(id) {
    state.sc = COURSES.find(c => c.id === id);
    const tag = document.getElementById('course-tag');
    tag.style.display = 'block'; tag.style.background = state.sc.bg; tag.style.color = state.sc.color; tag.innerText = state.sc.name;
    
    let html = `<button class="btn" style="background:#eee; color:#666" onclick="renderHome()">← CORSI</button>`;
    ["Story 1", "Story 2", "Story 3", "Story 4"].forEach(s => {
        html += `<div class="card" style="border-left-color:${state.sc.color}" onclick="renderDays('${s}')"><b>${s}</b></div>`;
    });
    document.getElementById('main-content').innerHTML = html;
}

function renderDays(s) {
    state.ss = s;
    document.getElementById('main-content').innerHTML = `
        <button class="btn" style="background:#eee; color:#666" onclick="renderStories('${state.sc.id}')">← STORIE</button>
        <h2 style="text-align:center; font-size:18px">${state.ss}</h2>
        <div class="grid">${Array.from({length:10}, (_,i) => `<div class="day-box" onclick="renderLesson(${i+1})">${i+1}</div>`).join('')}</div>`;
}

function renderLesson(d) {
    state.sd = d;
    const activities = state.lessons[`${state.sc.id}|${state.ss}|${state.sd}`] || [];
    let html = `
        <button class="btn" style="background:#eee; color:#666" onclick="renderDays('${state.ss}')">← GIORNI</button>
        <h2 style="text-align:center; font-size:18px">${state.ss} - Giorno ${d}</h2>
        <button class="btn" style="background:${state.sc.color}" onclick="addActivity()">➕ AGGIUNGI ATTIVITÀ</button>
    `;
    activities.forEach(a => {
        html += `<div class="card" style="border-left-color:${state.sc.color}; display:block"><b>${a.name}</b></div>`;
    });
    document.getElementById('main-content').innerHTML = html;
}

function addActivity() {
    const name = prompt("Inserisci il nome dell'attività:");
    if (!name) return;
    const key = `${state.sc.id}|${state.ss}|${state.sd}`;
    if (!state.lessons[key]) state.lessons[key] = [];
    state.lessons[key].push({ name });
    save(); renderLesson(state.sd);
}

renderHome();
</script>
</body>
</html>
