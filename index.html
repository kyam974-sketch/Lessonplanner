<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K&U Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #FAFAF7; margin: 0; padding: 0; color: #3C3C3B; }
        header { padding: 15px; background: #fff; border-bottom: 3px solid #8CB43B; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:10; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: #fff; border-radius: 15px; padding: 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 6px solid #8CB43B; cursor: pointer; display: flex; align-items: center; }
        .emoji { font-size: 24px; margin-right: 15px; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: 900; width: 100%; cursor: pointer; background: #8CB43B; color: #fff; margin-bottom: 10px; font-family: 'Nunito'; text-align: center; }
        .btn-scan { background: #F26522; margin-bottom: 5px; }
        .btn-manual { background: #444; font-size: 12px; padding: 8px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .day-box { padding: 18px 5px; background: #fff; border: 1px solid #eee; border-radius: 12px; text-align: center; font-weight: 900; cursor: pointer; }
        #course-tag { padding: 4px 12px; border-radius: 15px; font-size: 11px; font-weight: 800; display: none; }
        #status-area { display: none; background: #E3F2FD; color: #1565C0; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; font-weight: 800; border: 2px solid #1565C0; }
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #F26522; border-radius: 50%; animation: rot .8s linear infinite; margin: 0 auto 5px; }
        @keyframes rot { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<header>
    <h1 onclick="renderHome()" style="margin:0; font-size:18px; font-weight:900; cursor:pointer">K&U PLANNER</h1>
    <div id="course-tag"></div>
</header>
<div class="container">
    <div id="status-area"></div>
    <div id="main-content"></div>
</div>

<script>
const COURSES = [
    { id: "mousy", name: "Mousy", color: "#8CB43B", bg: "#F0F7E1", em: "🐭" },
    { id: "linda", name: "Linda", color: "#F26522", bg: "#FFF0E6", em: "🐱" },
    { id: "sam", name: "Sam", color: "#00B3B0", bg: "#E0F7F7", em: "🧸" },
    { id: "emma", name: "Emma", color: "#E878A0", bg: "#FFF0F5", em: "🦋" },
    { id: "oliver", name: "Oliver", color: "#00B3B0", bg: "#E0F7F7", em: "🐸" },
    { id: "marcia", name: "Marcia", color: "#E94E58", bg: "#FFEBEE", em: "🎀" }
];

let state = { sc: null, ss: null, sd: null, lessons: JSON.parse(localStorage.getItem("ku_l") || "{}"), routines: JSON.parse(localStorage.getItem("ku_r") || "{}") };
function save() { localStorage.setItem("ku_l", JSON.stringify(state.lessons)); localStorage.setItem("ku_r", JSON.stringify(state.routines)); }

async function handleScan(event, type, storyKey) {
    const file = event.target.files[0]; if (!file) return;
    const status = document.getElementById('status-area'); status.style.display = 'block'; status.innerHTML = '<div class="spinner"></div>Analisi...';
    try {
        const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result.split(',')[1]); rd.readAsDataURL(file); });
        const res = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: "Estrai JSON: [{name, duration, description}]", imageB64: b64 })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        const parsed = JSON.parse(data.text.match(/\[[\s\S]*\]/)[0]);

        if (type === 'rou') { state.routines[state.sc.id+'|'+storyKey] = parsed; } 
        else {
            const rKey = state.sc.id+'|'+state.ss+'|'+state.sd;
            state.lessons[rKey] = [...(state.routines[state.sc.id+'|'+state.ss] || []), ...parsed];
        }
        save(); renderHome(); renderStories(state.sc.id);
        status.innerHTML = "✓ Fatto!"; setTimeout(() => status.style.display = 'none', 2000);
    } catch (e) { alert("Errore: " + e.message); status.style.display = 'none'; }
}

function addManual() {
    const name = prompt("Nome attività:"); if (!name) return;
    const rKey = state.sc.id+'|'+state.ss+'|'+state.sd;
    if (!state.lessons[rKey]) state.lessons[rKey] = [];
    state.lessons[rKey].push({ name, duration: "5" });
    save(); renderLesson(state.sd);
}

function renderHome() {
    state.sc = null; document.getElementById('course-tag').style.display = 'none';
    document.getElementById('main-content').innerHTML = COURSES.map(c => `
        <div class="card" style="border-left-color:${c.color}" onclick="renderStories('${c.id}')">
            <span class="emoji">${c.em}</span> <b>${c.name}</b>
        </div>`).join('');
}

function renderStories(id) {
    state.sc = COURSES.find(c => c.id === id);
    const tag = document.getElementById('course-tag');
    tag.style.display = 'block'; tag.style.background = state.sc.bg; tag.style.color = state.sc.color; tag.innerText = state.sc.name;
    let html = `<button class="btn" style="background:none; color:#666" onclick="renderHome()">← CORSI</button>`;
    ["Story 1", "Story 2", "Story 3", "Story 4"].forEach(s => {
        const hasR = !!state.routines[state.sc.id + '|' + s];
        html += `<div class="card" style="border-left-color:${state.sc.color}; justify-content:space-between">
            <b onclick="renderDays('${s}')" style="flex:1">${s}</b>
            <label style="background:${hasR ? '#E8F5E9' : '#FFF3E0'}; padding:8px; border-radius:8px; font-size:10px; font-weight:900">
                📸 ROUTINES <input type="file" hidden onchange="handleScan(event, 'rou', '${s}')">
            </label>
        </div>`;
    });
    document.getElementById('main-content').innerHTML = html;
}

function renderDays(s) {
    state.ss = s;
    document.getElementById('main-content').innerHTML = `
        <button class="btn" style="background:none; color:#666" onclick="renderStories('${state.sc.id}')">← STORIE</button>
        <h2 style="text-align:center">${s}</h2>
        <div class="grid">${Array.from({length:10}, (_,i) => `<div class="day-box" onclick="renderLesson(${i+1})">${i+1}</div>`).join('')}</div>`;
}

function renderLesson(d) {
    state.sd = d;
    const activities = state.lessons[`${state.sc.id}|${state.ss}|${state.sd}`] || [];
    let html = `
        <button class="btn" style="background:none; color:#666" onclick="renderDays('${state.ss}')">← GIORNI</button>
        <label class="btn btn-scan">📸 SCAN LEZIONE ${d} <input type="file" hidden onchange="handleScan(event, 'day')"></label>
        <button class="btn btn-manual" onclick="addManual()">➕ AGGIUNGI MANUALE</button>
    `;
    activities.forEach(a => { html += `<div class="card" style="border-left-color:${state.sc.color}"><b>${a.name}</b></div>`; });
    document.getElementById('main-content').innerHTML = html;
}
renderHome();
</script>
</body>
</html>
