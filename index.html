<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K&U Planner PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --cc: #8CB43B; }
        body { font-family: 'Nunito', sans-serif; background: #FAFAF7; margin: 0; padding: 0; color: #3C3C3B; }
        header { padding: 15px; background: #fff; border-bottom: 3px solid var(--cc); display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:10; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: #fff; border-radius: 15px; padding: 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 6px solid var(--cc); cursor: pointer; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: 900; width: 100%; cursor: pointer; background: var(--cc); color: #fff; margin-bottom: 10px; font-family: 'Nunito'; text-align: center; }
        .status-box { display: none; background: #E3F2FD; color: #1565C0; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; font-weight: 800; border: 2px solid #1565C0; }
        .error-log { display: none; background: #FFEBEE; color: #C62828; padding: 15px; border-radius: 10px; font-size: 11px; margin-top: 10px; white-space: pre-wrap; border: 1px solid #EF9A9A; }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #F26522; border-radius: 50%; animation: rot .8s linear infinite; margin: 0 auto 5px; }
        @keyframes rot { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1 onclick="renderHome()" style="margin:0; font-size:18px; font-weight:900; cursor:pointer">K&U PLANNER</h1>
    <div id="course-tag" style="padding:4px 12px; border-radius:15px; font-size:11px; font-weight:800; display:none"></div>
</header>

<div class="container">
    <div id="status-area" class="status-box"></div>
    <div id="error-log" class="error-log"></div>
    <div id="main-content"></div>
</div>

<script>
const COURSES = [
    {id:"mousy", name:"Mousy", color:"#8CB43B", bg:"#F0F7E1", em:"🐭"},
    {id:"linda", name:"Linda", color:"#F26522", bg:"#FFF0E6", em:"🐱"},
    {id:"sam", name:"Sam", color:"#00B3B0", bg:"#E0F7F7", em:"🧸"},
    {id:"emma", name:"Emma", color:"#E878A0", bg:"#FFF0F5", em:"🦋"},
    {id:"oliver", name:"Oliver", color:"#00B3B0", bg:"#E0F7F7", em:"🐸"},
    {id:"marcia", name:"Marcia", color:"#E94E58", bg:"#FFEBEE", em:"🎀"}
];

let state = { sc: null, ss: null, sd: null, lessons: {}, routines: {} };

function load() {
    const d = JSON.parse(localStorage.getItem("ku_vfinal") || '{"l":{},"r":{}}');
    state.lessons = d.l; state.routines = d.r;
}
function save() { localStorage.setItem("ku_vfinal", JSON.stringify({l: state.lessons, r: state.routines})); }

async function handleScan(event, type, storyKey) {
    const files = event.target.files;
    if (!files.length) return;
    
    const status = document.getElementById('status-area');
    const errLog = document.getElementById('error-log');
    status.style.display = 'block';
    errLog.style.display = 'none';
    status.innerHTML = '<div class="spinner"></div>Analisi profonda in corso...';

    try {
        const imgs = [];
        for (let f of files) {
            const b64 = await new Promise(r => {
                const rd = new FileReader();
                rd.onload = () => r(rd.result.split(',')[1]);
                rd.readAsDataURL(f);
            });
            imgs.push({type: "image", source: {type: "base64", media_type: f.type || "image/jpeg", data: b64}});
        }

        const prompt = type === 'rou' 
            ? "Extract Kids&Us routines. Return ONLY a JSON array: [{type, name, duration, target_language, description}]"
            : "Extract Kids&Us lesson activities. Return ONLY a JSON array: [{name, duration, target_language, description}]";

        const res = await fetch("/api/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                model: "claude-3-5-sonnet-20240620",
                max_tokens: 4000,
                messages: [{role: "user", content: [...imgs, {type: "text", text: prompt}]}]
            })
        });

        const data = await res.json();
        
        // --- SUPER ANALIZZATORE DI RISPOSTA ---
        let rawText = "";
        if (data.content && data.content[0] && data.content[0].text) rawText = data.content[0].text;
        else if (data.text) rawText = data.text;
        else rawText = JSON.stringify(data);

        const jsonMatch = rawText.match(/\[[\s\S]*\]/);
        if (!jsonMatch) {
            console.error("Raw response:", rawText);
            throw new Error("Formato dati non riconosciuto. Risposta grezza: " + rawText.substring(0, 100) + "...");
        }

        const parsed = JSON.parse(jsonMatch[0]);

        if (type === 'rou') {
            state.routines[state.sc.id + '|' + storyKey] = parsed;
        } else {
            const rKey = state.sc.id + '|' + state.ss;
            const rts = state.routines[rKey] || [];
            state.lessons[state.sc.id + '|' + state.ss + '|' + state.sd] = [
                ...rts.filter(r => r.type === 'welcome' || r.type === 'warmup'),
                ...parsed,
                ...rts.filter(r => r.type === 'goodbye')
            ].map((a, i) => ({...a, id: Date.now() + i}));
        }
        
        save();
        status.innerHTML = "✓ Completato!";
        if (type === 'rou') renderStories(state.sc.id); else renderLesson(state.sd);
        setTimeout(() => status.style.display = 'none', 2000);

    } catch (e) {
        status.innerHTML = "Errore durante l'analisi.";
        errLog.style.display = 'block';
        errLog.innerText = "Dettagli Errore: " + e.message;
    }
}

function renderHome() {
    state.sc = null;
    document.getElementById('course-tag').style.display = 'none';
    const main = document.getElementById('main-content');
    main.innerHTML = COURSES.map(c => `
        <div class="card" style="border-left-color:${c.color}" onclick="renderStories('${c.id}')">
            <span style="font-size:24px">${c.em}</span> <b style="margin-left:10px">${c.name}</b>
        </div>
    `).join('');
}

function renderStories(courseId) {
    const c = COURSES.find(x => x.id === courseId);
    state.sc = c;
    const tag = document.getElementById('course-tag');
    tag.style.display = 'block'; tag.style.background = c.bg; tag.style.color = c.color; tag.innerText = c.name;
    const main = document.getElementById('main-content');
    let html = `<button class="btn" style="background:none; color:${c.color}; width:auto; padding:0; margin-bottom:15px" onclick="renderHome()">← CORSI</button>`;
    ["Story 1", "Story 2", "Story 3", "Story 4"].forEach(s => {
        const hasR = !!state.routines[c.id + '|' + s];
        html += `<div class="card" style="border-left-color:${c.color}; display:flex; justify-content:space-between; align-items:center">
            <b onclick="renderDays('${s}')" style="flex:1">${s}</b>
            <label style="background:${hasR ? '#E8F5E9' : '#FFF3E0'}; padding:6px 10px; border-radius:8px; font-size:10px; font-weight:900; cursor:pointer">
                ${hasR ? "✓ ROUTINES" : "📸 SET ROUTINES"}
                <input type="file" multiple hidden onchange="handleScan(event, 'rou', '${s}')">
            </label>
        </div>`;
    });
    main.innerHTML = html;
}

function renderDays(storyName) {
    state.ss = storyName;
    const main = document.getElementById('main-content');
    main.innerHTML = `<button class="btn" style="background:none; color:${state.sc.color}; width:auto; padding:0" onclick="renderStories('${state.sc.id}')">← STORIE</button>
    <div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; margin-top:15px">
        ${Array.from({length:10}, (_,i) => `<div style="padding:15px 5px; background:#fff; border:1px solid #eee; border-radius:12px; text-align:center; font-weight:900; cursor:pointer" onclick="renderLesson(${i+1})">${i+1}</div>`).join('')}
    </div>`;
}

function renderLesson(day) {
    state.sd = day;
    const main = document.getElementById('main-content');
    const data = state.lessons[state.sc.id + '|' + state.ss + '|' + state.sd] || [];
    let html = `<button class="btn" style="background:none; color:${state.sc.color}; width:auto; padding:0" onclick="renderDays('${state.ss}')">← GIORNI</button>
    <h2 style="font-size:18px">${state.ss} - Giorno ${day}</h2>
    <label class="btn" style="background:${state.sc.color}">📸 SCAN LEZIONE GIORNO ${day}<input type="file" multiple hidden onchange="handleScan(event, 'day')"></label>`;
    data.forEach(a => {
        html += `<div class="card" style="border-left-color:${a.type ? '#ddd' : state.sc.color}">
            <div style="display:flex; justify-content:space-between"><b>${a.name}</b><small>${a.duration}m</small></div>
            <p style="font-size:11px; color:#666; margin-top:5px">${a.description}</p>
        </div>`;
    });
    main.innerHTML = html;
}

load(); renderHome();
</script>
</body>
</html>
