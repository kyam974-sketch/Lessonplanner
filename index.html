<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kids&Us Lesson Planner</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Nunito',sans-serif;background:#FAFAF7;color:#3C3C3B;min-height:100vh}
        @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes sp{to{transform:rotate(360deg)}}
        @media print{body>*:not(#printView){display:none!important}#printView{display:block!important;position:static!important}}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Recuperiamo le funzioni di React senza usare "import"
        const { useState, useEffect, useRef, useCallback } = React;

        const CS = [
          {id:"mousy",name:"Mousy",color:"#8CB43B",bg:"#F0F7E1",em:"\u{1F42D}",age:"1 anno",parts:["Part One","Part Two","Part Three","Part Four"],dp:10},
          {id:"linda",name:"Linda",color:"#F26522",bg:"#FFF0E6",em:"\u{1F431}",age:"2 anni",parts:["Part One","Part Two","Part Three","Part Four"],dp:10},
          {id:"sam",name:"Sam",color:"#00B3B0",bg:"#E0F7F7",em:"\u{1F9F8}",age:"3 anni",parts:["Story 1: Happy Birthday","Story 2: The Park","Story 3: The Zoo","Story 4: The Picnic"],dp:10},
          {id:"emma",name:"Emma",color:"#E878A0",bg:"#FFF0F5",em:"\u{1F98B}",age:"4 anni",parts:["Story 1: Sweets","Story 2: Eggs","Story 3: Bath","Story 4"],dp:10},
          {id:"oliver",name:"Oliver",color:"#00B3B0",bg:"#E0F7F7",em:"\u{1F438}",age:"5 anni",parts:["Story 1: Wobbly Tooth","Story 2: Flu","Story 3: Baby","Story 4"],dp:10},
          {id:"marcia",name:"Marcia",color:"#E94E58",bg:"#FFEBEE",em:"\u{1F380}",age:"6 anni",parts:["Story 1: The Alien","Story 2: Polly Goes to School","Story 3: The Ski Trip","Story 4: The Birthday Cake"],dp:10},
        ];

        const S={
            btn:{padding:"8px 16px",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:800,fontFamily:"'Nunito'"},
            sm:{width:"26px",height:"26px",borderRadius:"7px",border:"1px solid #eee",background:"#fafafa",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",color:"#bbb"},
            lab:{display:"flex",flexDirection:"column",gap:"4px",fontSize:"12px",fontWeight:700,color:"#888",marginBottom:"12px"},
            inp:{padding:"10px 12px",border:"2px solid #eee",borderRadius:"10px",fontSize:"14px",fontWeight:600,resize:"vertical",fontFamily:"'Nunito'"}
        };

        // --- QUI INCOLLA TUTTA LA LOGICA DEL COMPONENTE APP ---
        function App() {
            const[view,setV]=useState("home");
            const[lessons,setL]=useState({});
            const[sc,setSc]=useState(null);
            const[sp,setSp]=useState(null);
            const[sd,setSd]=useState(null);
            const[st,setSt]=useState("17:00");
            const[ld,setLd]=useState(true);
            const[ea,setEa]=useState(null);
            const[ef,setEf]=useState({});
            const[el,setEl]=useState(0);
            const[lv,setLv]=useState(false);
            const[ci,setCi]=useState(0);
            const[dn,setDn]=useState(new Set());
            const[as2,setAs]=useState(false);
            const[pr,setPr]=useState(false);
            const[scn,setScn]=useState(false);
            const[ss,setSs]=useState("");
            const[exp,setExp]=useState(new Set());
            const fr=useRef(null),tr=useRef(null),ar=useRef(null);

            useEffect(()=>{
                const s=localStorage.getItem("ku7");
                if(s) setL(JSON.parse(s));
                setLd(false);
            },[]);

            useEffect(()=>{if(!ld) localStorage.setItem("ku7",JSON.stringify(lessons))},[lessons,ld]);

            // Timer Live
            useEffect(()=>{
                if(lv) tr.current=setInterval(()=>setEl(e=>e+1),1000);
                else clearInterval(tr.current);
                return ()=>clearInterval(tr.current);
            },[lv]);

            const cl=sc&&sp!=null&&sd!=null?lessons[sc.id+"|"+sp+"|"+sd]:null;
            const svL=useCallback(l=>{setL(p=>({...p,[l.courseId+"|"+l.part+"|"+l.day]:l}))},[]);
            
            const gT=(a,s)=>{
                const[h,m]=s.split(":").map(Number);
                let c=0;
                return a.filter(x=>!x.optional).map(x=>{
                    const t=h*60+m+c;
                    c+=x.duration;
                    return {...x,st:`${String(Math.floor(t/60)%24).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`};
                });
            };

            const scanD=async files=>{
                if(!files||!files.length||!sc||!sp||!sd)return;
                setScn(true);setSs("Lettura immagini...");
                try{
                    const imgs=[];
                    for(const f of files){
                        const b=await new Promise((r,j)=>{
                            const rd=new FileReader();
                            rd.onload=()=>r(rd.result.split(",")[1]);
                            rd.onerror=j;
                            rd.readAsDataURL(f);
                        });
                        imgs.push({type:"image",source:{type:"base64",media_type:f.type||"image/jpeg",data:b}});
                    }
                    setSs("Analisi con Claude...");
                    const res=await fetch("/api/generate",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({
                            model:"claude-3-5-sonnet-20240620",
                            max_tokens:4000,
                            messages:[{role:"user",content:[...imgs,{type:"text",text:"Extract lesson activities from these Teacher Guide pages. Return ONLY a JSON array."}]}]
                        })
                    });
                    const d=await res.json();
                    const txt=d.content?.[0]?.text || "";
                    let parsed=JSON.parse(txt.replace(/```json\n?|```/g,"").trim());
                    const acts=parsed.map((p,i)=>({id:"s"+Date.now()+"_"+i,...p}));
                    svL({courseId:sc.id,part:sp,day:sd,activities:acts});
                    setSs("Fatto!");
                    setTimeout(()=>setScn(false),2000);
                }catch(e){
                    setSs("Errore: "+e.message);
                    setTimeout(()=>setScn(false),4000);
                }
            };

            // --- INSERISCO QUI IL RENDER (IL RITORNO DEL COMPONENTE) ---
            // Nota: Ho mantenuto la struttura visiva Mousy/Linda
            if(ld) return <div style={{padding:20}}>Caricamento...</div>;

            // Se la variabile pr (Print) è attiva, mostro la visualizzazione stampa
            if(pr && cl) {
                return (
                    <div id="printView" style={{padding:20, background:"#fff"}}>
                        <h2>{sc.em} {sc.name} - Day {sd}</h2>
                        <button onClick={()=>window.print()}>Stampa</button>
                        <button onClick={()=>setPr(false)}>Chiudi</button>
                        {cl.activities.map(a => (
                            <div key={a.id} style={{borderBottom:"1px solid #eee", padding:10}}>
                                <b>{a.name}</b> ({a.duration}m)
                                <p>{a.target_language}</p>
                            </div>
                        ))}
                    </div>
                );
            }

            return (
                <div style={{minHeight:"100vh"}}>
                    <header style={{padding:15, background:"#fff", borderBottom:"3px solid #8CB43B", display:"flex", justifyContent:"space-between"}}>
                        <h1 onClick={()=>setV("home")} style={{cursor:"pointer"}}>Kids&Us Planner</h1>
                    </header>
                    <main style={{maxWidth:900, margin:"0 auto", padding:20}}>
                        {view==="home" && (
                            <div style={{display:"flex", flexDirection:"column", gap:12}}>
                                {CS.map(c => (
                                    <div key={c.id} onClick={()=>{setSc(c);setV("course")}} style={{padding:20, background:"#fff", borderRadius:15, borderLeft:"5px solid "+c.color, cursor:"pointer"}}>
                                        {c.em} {c.name}
                                    </div>
                                ))}
                            </div>
                        )}
                        {view==="course" && sc && (
                            <div>
                                <h2>{sc.name}</h2>
                                <div style={{display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:10, marginTop:20}}>
                                    {[...Array(sc.dp)].map((_,i) => (
                                        <div key={i} onClick={()=>{setSp(sc.parts[0]);setSd(i+1);setV("lesson")}} style={{padding:15, background:"#fff", borderRadius:10, textAlign:"center", cursor:"pointer", border:"1px solid #ddd"}}>
                                            {i+1}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {view==="lesson" && (
                            <div>
                                <h2>Day {sd}</h2>
                                <button onClick={()=>fr.current.click()} style={{padding:15, background:"#F26522", color:"#fff", border:"none", borderRadius:10}}>SCAN TG</button>
                                <input type="file" ref={fr} multiple style={{display:"none"}} onChange={e=>scanD(e.target.files)}/>
                                {scn && <p>{ss}</p>}
                                {cl && cl.activities.map(a => (
                                    <div key={a.id} style={{padding:15, background:"#fff", margin:"10px 0", borderRadius:10, borderLeft:"4px solid "+sc.color}}>
                                        <b>{a.name}</b> ({a.duration}m)
                                        <p style={{fontSize:13, color:"#666"}}>{a.target_language}</p>
                                    </div>
                                ))}
                                {cl && <button onClick={()=>setV("live")} style={{marginTop:20, padding:10}}>AVVIA TIMER LIVE</button>}
                            </div>
                        )}
                        {view==="live" && (
                            <div style={{textAlign:"center"}}>
                                <h1>{Math.floor(el/60)}:{(el%60).toString().padStart(2,'0')}</h1>
                                <button onClick={()=>setLv(!lv)}>{lv?"PAUSA":"START"}</button>
                                <button onClick={()=>setV("lesson")}>INDIETRO</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
