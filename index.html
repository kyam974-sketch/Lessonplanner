<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kids&Us Lesson Planner</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Nunito',sans-serif;background:#FAFAF7;color:#3C3C3B;min-height:100vh;overflow-x:hidden}
        @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes sp{to{transform:rotate(360deg)}}
        @media print{body>*:not(#printView){display:none!important}#printView{display:block!important;position:static!important}}
        
        /* Classi CSS per rifinire l'interfaccia di Claude */
        .btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;transition:all .2s}
        .btn:active{transform:scale(.95)}
        .inp{padding:10px 12px;border:2px solid #eee;border-radius:10px;font-size:14px;font-weight:600;font-family:'Nunito',sans-serif;width:100%}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const CS = [
          {id:"mousy",name:"Mousy",color:"#8CB43B",bg:"#F0F7E1",em:"\u{1F42D}",age:"1 anno",parts:["Part One","Part Two","Part Three","Part Four"],dp:10},
          {id:"linda",name:"Linda",color:"#F26522",bg:"#FFF0E6",em:"\u{1F431}",age:"2 anni",parts:["Part One","Part Two","Part Three","Part Four"],dp:10},
          {id:"sam",name:"Sam",color:"#00B3B0",bg:"#E0F7F7",em:"\u{1F9F8}",age:"3 anni",parts:["Story 1: Happy Birthday","Story 2: The Park","Story 3: The Zoo","Story 4: The Picnic"],dp:10},
          {id:"emma",name:"Emma",color:"#E878A0",bg:"#FFF0F5",em:"\u{1F98B}",age:"4 anni",parts:["Story 1: Sweets","Story 2: Eggs","Story 3: Bath","Story 4"],dp:10},
          {id:"oliver",name:"Oliver",color:"#00B3B0",bg:"#E0F7F7",em:"\u{1F438}",age:"5 anni",parts:["Story 1: Wobbly Tooth","Story 2: Flu","Story 3: Baby","Story 4"],dp:10},
          {id:"marcia",name:"Marcia",color:"#E94E58",bg:"#FFEBEE",em:"\u{1F380}",age:"6 anni",parts:["Story 1: The Alien","Story 2: Polly Goes to School","Story 3: The Ski Trip","Story 4: The Birthday Cake"],dp:10},
        ];

        // --- INIZIO CODICE INTEGRALE DI CLAUDE ---
        function App() {
          const [view, setV] = useState("home");
          const [lessons, setL] = useState({});
          const [sc, setSc] = useState(null);
          const [sp, setSp] = useState(null);
          const [sd, setSd] = useState(null);
          const [st, setSt] = useState("17:00");
          const [ld, setLd] = useState(true);
          const [ea, setEa] = useState(null);
          const [el, setEl] = useState(0);
          const [lv, setLv] = useState(false);
          const [dn, setDn] = useState(new Set());
          const [scn, setScn] = useState(false);
          const [ss, setSs] = useState("");
          const fr = useRef(null);
          const tr = useRef(null);

          useEffect(() => {
            const saved = localStorage.getItem("ku7");
            if (saved) setL(JSON.parse(saved));
            setLd(false);
          }, []);

          useEffect(() => {
            if (!ld) localStorage.setItem("ku7", JSON.stringify(lessons));
          }, [lessons, ld]);

          useEffect(() => {
            if (lv) tr.current = setInterval(() => setEl(e => e + 1), 1000);
            else clearInterval(tr.current);
            return () => clearInterval(tr.current);
          }, [lv]);

          const cl = sc && sp != null && sd != null ? lessons[sc.id + "|" + sp + "|" + sd] : null;

          const scanD = async (files) => {
            if (!files || !files.length || !sc) return;
            setScn(true); setSs("Reading Teacher Guide...");
            try {
              const imgs = [];
              for (const f of files) {
                const b = await new Promise((r) => {
                  const rd = new FileReader();
                  rd.onload = () => r(rd.result.split(",")[1]);
                  rd.readAsDataURL(f);
                });
                imgs.push({ type: "image", source: { type: "base64", media_type: f.type || "image/jpeg", data: b } });
              }
              
              setSs("Claude is analyzing...");
              const res = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  model: "claude-3-5-sonnet-20240620",
                  max_tokens: 4000,
                  messages: [{ role: "user", content: [...imgs, { type: "text", text: "Analizza queste pagine del Teacher Guide Kids&Us e restituisci un JSON array di attività con: name, duration (numero), target_language, description, materials, optional (boolean), tracks, sub (array di {name, target_language})." }] }]
                })
              });

              const d = await res.json();
              const txt = d.content[0].text;
              const parsed = JSON.parse(txt.replace(/```json\n?|```/g, ""));
              
              setL(prev => ({ 
                ...prev, 
                [sc.id + "|" + sp + "|" + sd]: { 
                    activities: parsed.map((a, i) => ({ ...a, id: "a" + Date.now() + i })) 
                } 
              }));
              setSs("Fatto!");
              setTimeout(() => setScn(false), 2000);
            } catch (e) {
              setSs("Errore: " + e.message);
              setTimeout(() => setScn(false), 4000);
            }
          };

          if (ld) return <div style={{padding:40, textAlign:"center"}}>Loading...</div>;

          return (
            <div style={{minHeight:"100vh", paddingBottom: 100}}>
              {/* Header */}
              <header style={{padding: "15px 20px", background: "#fff", borderBottom: "3px solid #8CB43B", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 100}}>
                <h1 style={{margin: 0, fontSize: 18, fontWeight: 900, cursor: "pointer"}} onClick={() => setV("home")}>
                   <span style={{color: "#8CB43B"}}>KIDS&US</span> PLANNER
                </h1>
                {sc && <div style={{background: sc.bg, color: sc.color, padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 800}}>{sc.name}</div>}
              </header>

              <main style={{maxWidth: 800, margin: "20px auto", padding: "0 15px"}}>
                {view === "home" && (
                  <div style={{display: "flex", flexDirection: "column", gap: 12, animation: "fi 0.4s ease-out"}}>
                    {CS.map(c => (
                      <div key={c.id} onClick={() => { setSc(c); setV("course"); }} style={{background: "#fff", padding: 25, borderRadius: 20, borderLeft: "8px solid " + c.color, boxShadow: "0 4px 12px rgba(0,0,0,0.05)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between"}}>
                        <div>
                            <div style={{fontSize: 28}}>{c.em}</div>
                            <div style={{fontWeight: 900, fontSize: 20, marginTop: 5}}>{c.name}</div>
                            <div style={{fontSize: 12, opacity: 0.6}}>{c.age}</div>
                        </div>
                        <div style={{fontSize: 24, opacity: 0.2}}>→</div>
                      </div>
                    ))}
                  </div>
                )}

                {view === "course" && sc && (
                  <div style={{animation: "fi 0.4s ease-out"}}>
                    <button onClick={() => setV("home")} style={{background: "none", border: "none", color: sc.color, fontWeight: 800, marginBottom: 20, cursor: "pointer"}}>← BACK</button>
                    <h2 style={{fontSize: 24, fontWeight: 900, marginBottom: 20}}>Select Day</h2>
                    {sc.parts.map(p => (
                      <div key={p} style={{marginBottom: 30}}>
                        <h4 style={{fontSize: 14, textTransform: "uppercase", letterSpacing: 1, color: "#888", marginBottom: 15}}>{p}</h4>
                        <div style={{display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 10}}>
                          {[...Array(sc.dp)].map((_, i) => (
                            <div key={i} onClick={() => { setSp(p); setSd(i+1); setV("lesson"); }} style={{padding: "15px 5px", background: "#fff", border: "2px solid #eee", borderRadius: 15, textAlign: "center", cursor: "pointer", fontWeight: 800}}>
                              {i + 1}
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {view === "lesson" && sc && (
                  <div style={{animation: "fi 0.4s ease-out"}}>
                    <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20}}>
                        <button onClick={() => setV("course")} style={{background: "none", border: "none", color: sc.color, fontWeight: 800, cursor: "pointer"}}>← DAYS</button>
                        <div style={{fontWeight: 900}}>{sp} - Day {sd}</div>
                    </div>

                    <div style={{background: "#fff", padding: 20, borderRadius: 20, boxShadow: "0 4px 15px rgba(0,0,0,0.05)", marginBottom: 20, textAlign: "center"}}>
                        <input type="file" ref={fr} multiple style={{display: "none"}} onChange={(e) => scanD(e.target.files)} />
                        {!cl ? (
                            <div>
                                <div style={{fontSize: 40, marginBottom: 10}}>📸</div>
                                <p style={{fontSize: 14, color: "#666", marginBottom: 20}}>No activities found for this day.</p>
                                <button onClick={() => fr.current.click()} style={{background: sc.color, color: "#fff", border: "none", padding: "15px 30px", borderRadius: 15, fontWeight: 900, width: "100%"}}>
                                    SCAN TEACHER GUIDE
                                </button>
                            </div>
                        ) : (
                            <div style={{display: "flex", gap: 10}}>
                                <button onClick={() => fr.current.click()} style={{flex: 1, background: "#eee", border: "none", padding: "12px", borderRadius: 12, fontWeight: 800, fontSize: 12}}>RESCOAN</button>
                                <button onClick={() => setV("live")} style={{flex: 2, background: sc.color, color: "#fff", border: "none", padding: "12px", borderRadius: 12, fontWeight: 800}}>START LESSON</button>
                            </div>
                        )}
                    </div>
                    
                    {scn && <div style={{padding: 20, background: sc.bg, color: sc.color, borderRadius: 15, marginBottom: 20, textAlign: "center", fontWeight: 800}}>{ss}</div>}

                    {cl && cl.activities.map((a, idx) => (
                      <div key={a.id} style={{background: "#fff", padding: 20, borderRadius: 18, marginBottom: 12, borderLeft: "6px solid " + (a.optional ? "#ddd" : sc.color), opacity: a.optional ? 0.7 : 1}}>
                        <div style={{display: "flex", justifyContent: "space-between", marginBottom: 8}}>
                            <span style={{fontWeight: 900, fontSize: 16}}>{idx + 1}. {a.name}</span>
                            <span style={{fontSize: 12, fontWeight: 800, background: "#f0f0f0", padding: "2px 8px", borderRadius: 6}}>{a.duration}m</span>
                        </div>
                        {a.tracks && <div style={{fontSize: 11, color: sc.color, fontWeight: 800, marginBottom: 8}}>🎵 {a.tracks}</div>}
                        {a.target_language && <div style={{background: sc.bg + "80", padding: "8px 12px", borderRadius: 10, fontSize: 13, marginBottom: 10}}><i>"{a.target_language}"</i></div>}
                        <p style={{fontSize: 12, color: "#666", lineHeight: 1.5}}>{a.description}</p>
                        {a.sub && a.sub.length > 0 && (
                            <div style={{marginTop: 10, borderTop: "1px solid #eee", paddingTop: 10}}>
                                {a.sub.map((s, i) => (
                                    <div key={i} style={{fontSize: 11, marginBottom: 4}}>• <b>{s.name}:</b> {s.target_language}</div>
                                ))}
                            </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}

                {view === "live" && (
                    <div style={{textAlign: "center", animation: "fi 0.4s ease-out"}}>
                        <div style={{fontSize: 60, fontWeight: 900, color: sc.color, margin: "40px 0"}}>
                            {Math.floor(el/60)}:{(el%60).toString().padStart(2,'0')}
                        </div>
                        <div style={{display: "flex", gap: 10, justifyContent: "center"}}>
                            <button onClick={() => setLv(!lv)} style={{padding: "20px 40px", borderRadius: 20, border: "none", background: lv ? "#eee" : sc.color, color: lv ? "#000" : "#fff", fontWeight: 900, fontSize: 18}}>
                                {lv ? "PAUSE" : "START"}
                            </button>
                            <button onClick={() => {setLv(false); setEl(0); setV("lesson");}} style={{padding: "20px", borderRadius: 20, border: "2px solid #eee", background: "none", fontWeight: 800}}>EXIT</button>
                        </div>
                    </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
