<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K&U Planner</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #FAFAF7; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: 900; width: 100%; cursor: pointer; }
        .spinner { width: 20px; height: 20px; border: 3px solid #eee; border-top: 3px solid #F26522; border-radius: 50%; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Struttura completa 4 Stories x 10 Giorni per tutti
        const COURSES = ["Mousy","Linda","Sam","Emma","Oliver","Marcia"].map((n, i) => ({
            id: n.toLowerCase(), name: n, 
            color: ["#8CB43B","#F26522","#00B3B0","#E878A0","#00B3B0","#E94E58"][i],
            bg: ["#F0F7E1","#FFF0E6","#E0F7F7","#FFF0F5","#E0F7F7","#FFEBEE"][i],
            em: ["🐭","🐱","🧸","🦋","🐸","🎀"][i],
            stories: ["Story 1", "Story 2", "Story 3", "Story 4"],
            days: 10
        }));

        function App() {
            const [view, setView] = useState('home');
            const [sc, setSc] = useState(null); // Corso selezionato
            const [ss, setSs] = useState(null); // Storia selezionata
            const [sd, setSd] = useState(null); // Giorno selezionato
            const [lessons, setLessons] = useState({});
            const [routines, setRoutines] = useState({});
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState("");

            // Caricamento dati salvati
            useEffect(() => {
                const l = localStorage.getItem("ku_l");
                const r = localStorage.getItem("ku_r");
                if (l) setLessons(JSON.parse(l));
                if (r) setRoutines(JSON.parse(r));
            }, []);

            // Salvataggio dati
            useEffect(() => {
                localStorage.setItem("ku_l", JSON.stringify(lessons));
                localStorage.setItem("ku_r", JSON.stringify(routines));
            }, [lessons, routines]);

            const handleFile = async (e, type) => {
                const files = e.target.files;
                if (!files.length) return;
                setLoading(true);
                setStatus("Analisi in corso...");

                try {
                    const imgs = [];
                    for (let f of files) {
                        const b64 = await new Promise(r => {
                            const reader = new FileReader();
                            reader.onload = () => r(reader.result.split(',')[1]);
                            reader.readAsDataURL(f);
                        });
                        imgs.push({type: "image", source: {type: "base64", media_type: f.type || "image/jpeg", data: b64}});
                    }

                    const prompt = type === 'rou' 
                        ? "Estrai Welcome, Warm-up e Goodbye (A/B) come JSON array: [{type, name, duration, target_language, description}]"
                        : "Estrai attività lezione (NO routine) come JSON array: [{name, duration, target_language, description}]";

                    const res = await fetch("/api/generate", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({
                            model: "claude-3-5-sonnet-20240620",
                            max_tokens: 4000,
                            messages: [{role: "user", content: [...imgs, {type: "text", text: prompt}]}]
                        })
                    });

                    const data = await res.json();
                    const txt = data.content[0].text;
                    const clean = JSON.parse(txt.match(/\[[\s\S]*\]/)[0]);

                    if (type === 'rou') {
                        setRoutines(prev => ({...prev, [`${sc.id}|${ss}`]: clean}));
                        setStatus("Routine salvate!");
                    } else {
                        const rKey = `${sc.id}|${ss}`;
                        const savedR = routines[rKey] || [];
                        const fullLesson = [
                            ...savedR.filter(r => r.type === 'welcome' || r.type === 'warmup'),
                            ...clean,
                            ...savedR.filter(r => r.type === 'goodbye')
                        ];
                        setLessons(prev => ({...prev, [`${sc.id}|${ss}|${sd}`]: fullLesson}));
                        setStatus("Lezione caricata!");
                    }
                } catch (err) {
                    setStatus("Errore: " + err.message);
                }
                setLoading(false);
            };

            const cc = sc?.color || "#8CB43B";
            const currentActivities = lessons[`${sc?.id}|${ss}|${sd}`] || [];

            return (
                <div style={{minHeight: '100vh'}}>
                    <header style={{padding: '15px', background: '#fff', borderBottom: `3px solid ${cc}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'sticky', top: 0, zIndex: 10}}>
                        <h1 onClick={() => setView('home')} style={{margin: 0, fontSize: '18px', fontWeight: 900}}>K&U PLANNER</h1>
                        {sc && <div style={{background: sc.bg, color: cc, padding: '4px 10px', borderRadius: '15px', fontSize: '12px', fontWeight: 800}}>{sc.name}</div>}
                    </header>

                    <main style={{padding: '15px', maxWidth: '600px', margin: '0 auto'}}>
                        {view === 'home' && COURSES.map(c => (
                            <div key={c.id} onClick={() => { setSc(c); setView('stories'); }} className="card" style={{borderLeft: `6px solid ${c.color}`, cursor: 'pointer'}}>
                                <span style={{fontSize: '24px'}}>{c.em}</span> <b style={{marginLeft: '10px'}}>{c.name}</b>
                            </div>
                        ))}

                        {view === 'stories' && sc && (
                            <div>
                                <button onClick={() => setView('home')} style={{background: 'none', border: 'none', color: cc, fontWeight: 800, marginBottom: '15px'}}>← CORSI</button>
                                {sc.stories.map(s => (
                                    <div key={s} className="card" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                        <b onClick={() => { setSs(s); setView('days'); }} style={{flex: 1, cursor: 'pointer'}}>{s}</b>
                                        <label style={{background: routines[`${sc.id}|${s}`] ? '#E8F5E9' : '#FFF3E0', padding: '6px 10px', borderRadius: '10px', fontSize: '10px', fontWeight: 900, cursor: 'pointer'}}>
                                            {routines[`${sc.id}|${s}`] ? "✓ ROUTINES" : "📸 SET ROUTINES"}
                                            <input type="file" multiple hidden onChange={(e) => { setSs(s); handleFile(e, 'rou'); }} />
                                        </label>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'days' && (
                            <div>
                                <button onClick={() => setView('stories')} style={{background: 'none', border: 'none', color: cc, fontWeight: 800, marginBottom: '15px'}}>← STORIE</button>
                                <div style={{display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '8px'}}>
                                    {[...Array(sc.days)].map((_, i) => (
                                        <div key={i} onClick={() => { setSd(i+1); setView('lesson'); }} style={{padding: '15px 5px', background: '#fff', border: '1px solid #eee', borderRadius: '10px', textAlign: 'center', fontWeight: 800}}>
                                            {i + 1}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'lesson' && (
                            <div>
                                <button onClick={() => setView('days')} style={{background: 'none', border: 'none', color: cc, fontWeight: 800, marginBottom: '15px'}}>← GIORNI</button>
                                <h2 style={{fontSize: '18px'}}>{ss} - Giorno {sd}</h2>
                                
                                <label className="btn" style={{background: cc, color: '#fff', textAlign: 'center', display: 'block'}}>
                                    📸 SCANSIONA TG (GIORNO {sd})
                                    <input type="file" multiple hidden onChange={(e) => handleFile(e, 'day')} />
                                </label>

                                {loading && <div className="spinner"></div>}
                                {status && <div style={{textAlign: 'center', fontSize: '12px', margin: '10px 0', color: cc, fontWeight: 800}}>{status}</div>}

                                {currentActivities.map((a, i) => (
                                    <div key={i} className="card" style={{borderLeft: `5px solid ${a.type ? '#ddd' : cc}`}}>
                                        <div style={{fontWeight: 900, fontSize: '14px'}}>{a.name} <span style={{float: 'right', fontSize: '11px', opacity: 0.5}}>{a.duration}m</span></div>
                                        {a.target_language && <div style={{fontSize: '12px', color: cc, marginTop: '5px', fontStyle: 'italic'}}>{a.target_language}</div>}
                                        <p style={{fontSize: '11px', color: '#666', marginTop: '5px'}}>{a.description}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
